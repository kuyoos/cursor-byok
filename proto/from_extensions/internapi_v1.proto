  bytes blob_id = 2;
  int32 index = 3;
  oneof type_specific_data {
    ImageBlobData image_data = 4;
  }
}

// Copied from: local:internapi.v1.BlobDataPerMessage (var: Txe)
message BlobDataPerMessage {
